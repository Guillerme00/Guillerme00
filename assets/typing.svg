<svg xmlns="http://www.w3.org/2000/svg" width="800" height="54" viewBox="0 0 800 54">
<style>
  .t {
    font-family: 'Consolas', 'Monaco', 'Lucida Console', 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
  }
  @media (prefers-color-scheme: dark)  { .t, .cur { fill: #a78bfa; } }
  @media (prefers-color-scheme: light) { .t, .cur { fill: #a78bfa; } }
  .cr1 { animation: cl1 20s infinite; }
  .cr2 { animation: cl2 20s infinite; }
  .cr3 { animation: cl3 20s infinite; }
  .cr4 { animation: cl4 20s infinite; }

  /* Line 1: HTML CSS JS — 11 chars — 145.2px */
  @keyframes cl1 {
    0%        { width: 0;       animation-timing-function: steps(11, end); }
    8.75%      { width: 145.2px; animation-timing-function: step-end; }
    16.25%     { width: 145.2px; animation-timing-function: steps(11, end); }
    21.25%, 100%  { width: 0; }
  }

  /* Line 2: TS React — 8 chars — 105.6px */
  @keyframes cl2 {
    0%, 24.9%  { width: 0; }
    25%        { width: 0;       animation-timing-function: steps(8, end); }
    33.75%      { width: 105.6px; animation-timing-function: step-end; }
    41.25%     { width: 105.6px; animation-timing-function: steps(8, end); }
    46.25%, 100%  { width: 0; }
  }

  /* Line 3: Python Django — 13 chars — 171.6px */
  @keyframes cl3 {
    0%, 49.9%  { width: 0; }
    50%        { width: 0;       animation-timing-function: steps(13, end); }
    58.75%      { width: 171.6px; animation-timing-function: step-end; }
    66.25%     { width: 171.6px; animation-timing-function: steps(13, end); }
    71.25%, 100%  { width: 0; }
  }

  /* Line 4: Git Docker — 10 chars — 132px */
  @keyframes cl4 {
    0%, 74.9%  { width: 0; }
    75%        { width: 0;       animation-timing-function: steps(10, end); }
    83.75%      { width: 132px; animation-timing-function: step-end; }
    91.25%     { width: 132px; animation-timing-function: steps(10, end); }
    96.25%, 100%  { width: 0; }
  }

  /* Cursor wrappers — control position and visibility */
  .cw1 { animation: cw1 20s infinite; }
  .cw2 { animation: cw2 20s infinite; }
  .cw3 { animation: cw3 20s infinite; }
  .cw4 { animation: cw4 20s infinite; }

  @keyframes cw1 {
    0%       { transform: translateX(2px);             visibility: visible; animation-timing-function: steps(11, end); }
    8.75%     { transform: translateX(147.2px); visibility: visible; animation-timing-function: step-end; }
    16.25%    { transform: translateX(147.2px); visibility: visible; animation-timing-function: steps(11, end); }
    21.25%   { transform: translateX(2px);             visibility: visible; }
    24.9%, 100% { visibility: hidden; transform: translateX(2px); }
  }

  @keyframes cw2 {
    0%, 24.9% { visibility: hidden; transform: translateX(2px); }
    25%       { transform: translateX(2px);             visibility: visible; animation-timing-function: steps(8, end); }
    33.75%     { transform: translateX(107.6px); visibility: visible; animation-timing-function: step-end; }
    41.25%    { transform: translateX(107.6px); visibility: visible; animation-timing-function: steps(8, end); }
    46.25%   { transform: translateX(2px);             visibility: visible; }
    49.9%, 100% { visibility: hidden; transform: translateX(2px); }
  }

  @keyframes cw3 {
    0%, 49.9% { visibility: hidden; transform: translateX(2px); }
    50%       { transform: translateX(2px);             visibility: visible; animation-timing-function: steps(13, end); }
    58.75%     { transform: translateX(173.6px); visibility: visible; animation-timing-function: step-end; }
    66.25%    { transform: translateX(173.6px); visibility: visible; animation-timing-function: steps(13, end); }
    71.25%   { transform: translateX(2px);             visibility: visible; }
    74.9%, 100% { visibility: hidden; transform: translateX(2px); }
  }

  @keyframes cw4 {
    0%, 74.9% { visibility: hidden; transform: translateX(2px); }
    75%       { transform: translateX(2px);             visibility: visible; animation-timing-function: steps(10, end); }
    83.75%     { transform: translateX(134px); visibility: visible; animation-timing-function: step-end; }
    91.25%    { transform: translateX(134px); visibility: visible; animation-timing-function: steps(10, end); }
    96.25%   { transform: translateX(2px);             visibility: visible; }
    100% { visibility: visible; transform: translateX(2px); }
  }

  /* Cursor blink */
  .cur { animation: blink 1.2s step-end infinite; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }
</style>

<defs>
  <clipPath id="cp1"><rect class="cr1" x="327.4" y="0" width="0" height="54"/></clipPath>
  <clipPath id="cp2"><rect class="cr2" x="347.2" y="0" width="0" height="54"/></clipPath>
  <clipPath id="cp3"><rect class="cr3" x="314.2" y="0" width="0" height="54"/></clipPath>
  <clipPath id="cp4"><rect class="cr4" x="334" y="0" width="0" height="54"/></clipPath>
</defs>

<!-- Text lines -->
<text class="t" clip-path="url(#cp1)" x="327.4" y="34" textLength="145.2" lengthAdjust="spacingAndGlyphs">HTML CSS JS</text>
<text class="t" clip-path="url(#cp2)" x="347.2" y="34" textLength="105.6" lengthAdjust="spacingAndGlyphs">TS React</text>
<text class="t" clip-path="url(#cp3)" x="314.2" y="34" textLength="171.6" lengthAdjust="spacingAndGlyphs">Python Django</text>
<text class="t" clip-path="url(#cp4)" x="334" y="34" textLength="132" lengthAdjust="spacingAndGlyphs">Git Docker</text>

<!-- Cursors -->
<g class="cw1"><rect class="cur" x="327.4" y="16" width="3.5" height="22"/></g>
<g class="cw2"><rect class="cur" x="347.2" y="16" width="3.5" height="22"/></g>
<g class="cw3"><rect class="cur" x="314.2" y="16" width="3.5" height="22"/></g>
<g class="cw4"><rect class="cur" x="334" y="16" width="3.5" height="22"/></g>

</svg>